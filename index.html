<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formulário de Contato</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header><h2>Fale Conosco</h2></header>

  <form action="#" method="post">

    <label for="nome">Nome</label>
    <input type="text" id="nome" name="nome" placeholder="Seu nome" required />

    <label for="sobrenome">Sobrenome</label>
    <input type="text" id="sobrenome" name="sobrenome" placeholder="Seu sobrenome" required />

    <label for="email">E-mail</label>
    <input type="email" id="email" name="email" placeholder="seu@email.com" required />

    <label for="telefone">Telefone</label>
    <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999" />

    <label for="assunto">Assunto</label>
    <select id="assunto" name="assunto" required>
      <option value="" disabled selected>Selecione uma opção</option>
      <option value="suporte">Suporte técnico</option>
      <option value="comercial">Comercial</option>
      <option value="parceria">Parceria</option>
      <option value="outro">Outro</option>
    </select>

    <label for="mensagem">Mensagem</label>
    <textarea id="mensagem" name="mensagem" placeholder="Escreva sua mensagem aqui..." required></textarea>

    <label>
      <input id="nic" type="checkbox" name="termos" required />
      Concordo com os termos de uso e política de privacidade.
    </label>
    

    <div>
      <button type="submit">Enviar</button>
      <button type="reset">Limpar</button>
    </div>


  </form>

</body>
<script src="script.js"></script>
</html>
